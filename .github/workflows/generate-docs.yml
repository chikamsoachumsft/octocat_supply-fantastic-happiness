name: Generate Documentation with Copilot

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/workflows/**'
      - '**/*.test.ts'
      - '**/*.spec.ts'
      - 'api/sql/seed/**'
      - 'api/sql/migrations/**'
      - '.gitignore'
      - 'LICENSE'

jobs:
  generate-docs:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitHub Copilot CLI
        env:
          GH_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
        run: |
          curl -fsSL https://gh.io/copilot-install | bash
          echo "Installed Copilot CLI version:"
          copilot --version

      - name: Count changed API source files
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'api/src/**' | grep -v '\.test\.ts$' | wc -l)
          echo "source_count=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed API source files: $CHANGED"

      - name: Analyze and delegate to Copilot
        if: steps.changes.outputs.source_count > 0
        env:
          GH_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
        run: |
          echo "Analyzing commit ${{ github.sha }}"
          echo "Loading documentation criteria from prompt..."

          PROMPT=$(cat .github/prompts/analyze-for-docs.prompt.md)
          PROMPT="${PROMPT//\{COMMIT_SHA\}/${{ github.sha }}}"
          PROMPT="${PROMPT//\{REPOSITORY\}/${{ github.repository }}}"

          echo "Delegating to GitHub Copilot..."
          echo "- Copilot will use MCP to examine the commit"
          echo "- Copilot will decide if documentation is needed"
          echo "- Copilot will create an issue and assign it to itself if needed"
          echo ""

          copilot -p "$PROMPT" --enable-all-github-mcp-tools --allow-all-tools

      - name: Skip analysis
        if: steps.changes.outputs.source_count == 0
        run: |
          echo "No API source files changed — skipping documentation analysis."

      - name: Ensure labels exist
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "agentic-workflow" --color "0075ca" --description "Created by an agentic workflow" 2>/dev/null || true
          gh label create "documentation" --color "0075ca" --description "Documentation related" 2>/dev/null || true
          gh label create "automated" --color "e4e669" --description "Automatically generated" 2>/dev/null || true

      - name: Create run summary issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.changes.outputs.source_count }}" = "0" ]; then
            STATUS="Skipped — no API source files changed"
          else
            STATUS="Copilot documentation analysis ran"
          fi

          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD -- 'api/src/**' | grep -v '\.test\.ts$' || echo "None")

          cat > /tmp/issue-body.md << BODYEOF
          ## Generate Documentation — Run Summary

          Workflow: Generate Documentation with Copilot
          Branch: ${{ github.ref_name }}
          Commit: ${{ github.sha }}
          Run URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}

          ### Status
          ${STATUS}

          ### Changed API Source Files (${{ steps.changes.outputs.source_count }})
          ${CHANGED_FILES}

          ### What happened
          - If Copilot found documentation gaps, a separate "Documentation needed" issue was created and assigned to @copilot
          - If no gaps were found, nothing else was created
          - See the Run URL above for Copilot's full analysis

          Auto-generated by: agentic-workflow-generate-docs
          BODYEOF

          gh issue create \
            --title "[generate-docs] Run summary — $(date +'%Y-%m-%d %H:%M') UTC" \
            --label "agentic-workflow" \
            --label "documentation" \
            --label "automated" \
            --body-file /tmp/issue-body.md || true
