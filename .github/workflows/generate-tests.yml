name: Generate Tests with Copilot

on:
  workflow_dispatch:
  push:
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - '.github/workflows/**'
      - '.gitignore'
      - 'LICENSE'
      - '*.config.js'
      - '*.config.ts'
      - 'api/sql/seed/**'
      - 'api/sql/migrations/**'

jobs:
  generate-tests:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      issues: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install GitHub Copilot CLI
        env:
          GH_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
        run: |
          curl -fsSL https://gh.io/copilot-install | bash
          echo "Installed Copilot CLI version:"
          copilot --version

      - name: Count changed source files
        id: changes
        run: |
          CHANGED=$(git diff --name-only HEAD~1 HEAD -- 'api/src/routes/*.ts' 'api/src/repositories/*.ts' | grep -v '\.test\.ts$' | wc -l)
          echo "source_count=$CHANGED" >> $GITHUB_OUTPUT
          echo "Changed source files: $CHANGED"

      - name: Analyze commit and generate test issues with Copilot
        if: steps.changes.outputs.source_count > 0
        env:
          GH_TOKEN: ${{ secrets.COPILOT_CLI_TOKEN }}
        run: |
          echo "Analyzing commit ${{ github.sha }} for test coverage..."
          echo "Source files changed: ${{ steps.changes.outputs.source_count }}"
          echo ""

          PROMPT=$(cat .github/prompts/analyze-for-tests.prompt.md)
          PROMPT="${PROMPT//\{COMMIT_SHA\}/${{ github.sha }}}"
          PROMPT="${PROMPT//\{REPOSITORY\}/${{ github.repository }}}"

          echo "Delegating to GitHub Copilot..."
          echo "- Copilot will examine the commit diff"
          echo "- Copilot will check for corresponding test files"
          echo "- Copilot will assess if new tests are needed"
          echo "- Copilot will create a GitHub issue and assign it to itself if recommended"
          echo ""

          copilot -p "$PROMPT" --enable-all-github-mcp-tools --allow-all-tools --no-ask-user

      - name: Skip analysis
        if: steps.changes.outputs.source_count == 0
        run: |
          echo "No route or repository source files changed — skipping test analysis."

      - name: Ensure labels exist
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh label create "agentic-workflow" --color "0075ca" --description "Created by an agentic workflow" 2>/dev/null || true
          gh label create "testing" --color "d93f0b" --description "Testing related" 2>/dev/null || true
          gh label create "automated" --color "e4e669" --description "Automatically generated" 2>/dev/null || true

      - name: Create run summary issue
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ "${{ steps.changes.outputs.source_count }}" = "0" ]; then
            STATUS="⏭️ Skipped — no route or repository source files changed"
          else
            STATUS="✅ Copilot test coverage analysis ran"
          fi

          CHANGED_FILES=$(git diff --name-only HEAD~1 HEAD -- 'api/src/routes/*.ts' 'api/src/repositories/*.ts' | grep -v '\.test\.ts$' || true)

          gh issue create \
            --title "📋 [generate-tests] Run summary — $(date +'%Y-%m-%d %H:%M') UTC" \
            --label "agentic-workflow,testing,automated" \
            --body "## 🧪 Generate Tests — Run Summary

**Workflow:** Generate Tests with Copilot
**Branch:** \`${{ github.ref_name }}\`
**Commit:** [\`${{ github.sha }}\`](${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }})
**Run:** [View run logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})

### Status
$STATUS

### Changed Route/Repository Files (${{ steps.changes.outputs.source_count }})
\`\`\`
${CHANGED_FILES:-None}
\`\`\`

### What happened
- If Copilot found missing tests, a separate \`🧪 Unit tests needed\` issue was created and assigned to @copilot
- If no gaps were found, nothing else was created
- Check the [run logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}) for Copilot's full analysis

---
*Auto-generated by: agentic-workflow-generate-tests*" || true
